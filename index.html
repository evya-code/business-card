<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אביתר דוידי — שיווק נדל"ן</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Heebo', sans-serif;
    padding: 20px;
  }

  .card {
    width: 420px;
    background: linear-gradient(145deg, #111118, #1a1a2e);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
      0 40px 80px rgba(0,0,0,0.6),
      0 0 0 1px rgba(99,102,241,0.15),
      inset 0 1px 0 rgba(255,255,255,0.05);
    overflow: hidden;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #6366f1, #8b5cf6, #06b6d4);
  }

  .glow {
    position: absolute;
    top: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .top {
    padding: 36px 32px 24px;
    position: relative;
  }

  .tag {
    display: inline-block;
    background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.3);
    color: #818cf8;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  .name {
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .name span {
    color: #818cf8;
  }

  .title {
    font-size: 14px;
    color: #94a3b8;
    font-weight: 400;
    margin-bottom: 10px;
    line-height: 1.6;
  }

  .greeting {
    font-size: 13px;
    color: rgba(129, 140, 248, 0.7);
    font-weight: 300;
    margin-bottom: 24px;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, rgba(99,102,241,0.3), transparent);
    margin: 0 32px;
  }

  .contacts {
    padding: 24px 32px 32px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .contact-row {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s;
  }

  .contact-row:hover .contact-text {
    color: #fff;
  }

  .icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 16px;
  }

  .contact-info {
    display: flex;
    flex-direction: column;
  }

  .contact-label {
    font-size: 10px;
    color: #475569;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 1px;
  }

  .contact-text {
    font-size: 14px;
    color: #cbd5e1;
    font-weight: 400;
    direction: ltr;
    text-align: right;
    transition: color 0.2s;
  }

  .bottom {
    padding: 16px 32px 20px;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .tagline {
    font-size: 12px;
    color: #475569;
    font-style: italic;
  }

  .tagline span {
    color: #6366f1;
  }

  .dots {
    display: flex;
    gap: 5px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(99,102,241,0.4);
  }

  .dot:first-child { background: #6366f1; }
  .dot:nth-child(2) { background: rgba(99,102,241,0.6); }
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>

  <div class="top">
    <div class="tag">שיווק נדל"ן · AI</div>
    <div class="name">אביתר <span>דוידי</span></div>
    <div class="title">
      שיווק דיגיטלי · יצירת לידים לנדל"ן<br>
      AI · תוכן · קשרי לקוחות
    </div>
    <div class="greeting">ברוך הבא, הנה הפרטים שלי 👋</div>
  </div>

  <div class="divider"></div>

  <div class="contacts">
    <a class="contact-row" href="tel:0505421034">
      <div class="icon">📞</div>
      <div class="contact-info">
        <span class="contact-label">טלפון</span>
        <span class="contact-text">050-542-1034</span>
      </div>
    </a>

    <a class="contact-row" href="https://www.facebook.com/evya.dav.98" target="_blank">
      <div class="icon">📘</div>
      <div class="contact-info">
        <span class="contact-label">פייסבוק</span>
        <span class="contact-text">Davidi Evyatar</span>
      </div>
    </a>

    <a class="contact-row" href="mailto:evya.phone@gmail.com">
      <div class="icon">✉️</div>
      <div class="contact-info">
        <span class="contact-label">אימייל</span>
        <span class="contact-text">evya.phone@gmail.com</span>
      </div>
    </a>
  </div>

  <div class="bottom">
    <div class="tagline">מביא לקוחות. <span>מייצר תוצאות.</span></div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>
</body>
</html>
