<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אביתר דוידי — שיווק נדל"ן</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Heebo', sans-serif;
    padding: 20px;
  }

  .card {
    width: 420px;
    background: linear-gradient(145deg, #111118, #1a1a2e);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
      0 40px 80px rgba(0,0,0,0.6),
      0 0 0 1px rgba(99,102,241,0.15),
      inset 0 1px 0 rgba(255,255,255,0.05);
    overflow: hidden;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #6366f1, #8b5cf6, #06b6d4);
  }

  .glow {
    position: absolute;
    top: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .top {
    padding: 36px 32px 24px;
    position: relative;
  }

  .tag {
    display: inline-block;
    background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.3);
    color: #818cf8;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  .name {
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .name span { color: #818cf8; }

  .title {
    font-size: 14px;
    color: #94a3b8;
    font-weight: 400;
    margin-bottom: 10px;
    line-height: 1.6;
  }

  .greeting {
    font-size: 13px;
    color: rgba(129, 140, 248, 0.7);
    font-weight: 300;
    margin-bottom: 24px;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, rgba(99,102,241,0.3), transparent);
    margin: 0 32px;
  }

  .contacts {
    padding: 24px 32px 32px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .contact-row {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s;
  }

  .contact-row:hover .contact-text { color: #fff; }

  .icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon svg { width: 16px; height: 16px; stroke: #818cf8; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  .contact-info { display: flex; flex-direction: column; }

  .contact-label {
    font-size: 10px;
    color: #475569;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 1px;
  }

  .contact-text {
    font-size: 14px;
    color: #cbd5e1;
    font-weight: 400;
    direction: ltr;
    text-align: right;
    transition: color 0.2s;
  }

  .bottom {
    padding: 16px 32px 20px;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .tagline { font-size: 12px; color: #475569; font-style: italic; }
  .tagline span { color: #6366f1; }

  .dots { display: flex; gap: 5px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(99,102,241,0.4); }
  .dot:first-child { background: #6366f1; }
  .dot:nth-child(2) { background: rgba(99,102,241,0.6); }

  /* edit mode styles */
  body.edit-mode [contenteditable] {
    outline: none;
    border-bottom: 1px dashed rgba(99,102,241,0.4);
    cursor: text;
  }
  body.edit-mode [contenteditable]:focus {
    border-bottom-color: #6366f1;
    background: rgba(99,102,241,0.06);
    border-radius: 3px;
  }
  body.edit-mode .contact-row { pointer-events: none; }

  /* ── Secret admin ── */
  #pin-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.88); z-index: 1000;
    align-items: center; justify-content: center;
  }
  #pin-overlay.show { display: flex; }
  #pin-box {
    background: #111118; border: 1px solid rgba(99,102,241,0.3);
    border-radius: 16px; padding: 28px 24px; width: 240px; text-align: center;
  }
  #pin-title { font-size: 12px; color: #818cf8; margin-bottom: 14px; letter-spacing: 0.5px; }
  #pin-input {
    width: 100%; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
    color: #fff; font-family: 'Heebo', sans-serif; font-size: 22px;
    text-align: center; letter-spacing: 6px; padding: 10px; outline: none;
    -webkit-text-security: disc;
  }
  #pin-input:focus { border-color: rgba(99,102,241,0.5); }
  #pin-error { font-size: 11px; color: #ef4444; margin-top: 8px; min-height: 14px; }

  #admin-panel {
    display: none; position: fixed; bottom: 20px; left: 20px; z-index: 500;
    background: #111118; border: 1px solid rgba(99,102,241,0.25);
    border-radius: 14px; padding: 10px; gap: 7px; flex-direction: column; min-width: 150px;
  }
  #admin-panel.show { display: flex; }
  #admin-label {
    font-size: 10px; color: #475569; letter-spacing: 0.8px; text-transform: uppercase;
    padding: 2px 4px 6px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 2px;
  }
  .admin-btn {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px; color: #94a3b8; font-family: 'Heebo', sans-serif; font-size: 12px;
    padding: 7px 10px; cursor: pointer; text-align: right; transition: all 0.15s;
    display: flex; align-items: center; gap: 8px; direction: rtl;
  }
  .admin-btn:hover { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.3); color: #818cf8; }
  .admin-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .admin-btn.active { color: #818cf8; border-color: rgba(99,102,241,0.4); }
</style>
</head>
<body>

<!-- PIN overlay -->
<div id="pin-overlay">
  <div id="pin-box">
    <div id="pin-title">הזן קוד גישה</div>
    <input id="pin-input" type="password" inputmode="numeric" maxlength="7" autocomplete="off" placeholder="·······" />
    <div id="pin-error"></div>
  </div>
</div>

<!-- Admin panel -->
<div id="admin-panel">
  <div id="admin-label">ניהול</div>
  <button class="admin-btn" id="btn-edit" onclick="adminToggleEdit()">
    <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    עריכת טקסט
  </button>
  <button class="admin-btn" onclick="adminCopyLink()">
    <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    העתק קישור
  </button>
  <button class="admin-btn" onclick="adminReset()">
    <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>
    איפוס עריכות
  </button>
  <button class="admin-btn" onclick="closeAdmin()" style="margin-top:4px; color:#475569;">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    סגור
  </button>
</div>

<div class="card">
  <div class="glow"></div>

  <div class="top">
    <div class="tag" contenteditable="false">שיווק נדל"ן · AI</div>
    <div class="name" contenteditable="false">אביתר <span>דוידי</span></div>
    <div class="title" contenteditable="false">שיווק דיגיטלי · יצירת לידים לנדל"ן<br>AI · תוכן · קשרי לקוחות</div>
    <div class="greeting" contenteditable="false">ברוך הבא, הנה הפרטים שלי</div>
  </div>

  <div class="divider"></div>

  <div class="contacts">
    <a class="contact-row" href="tel:0505421034">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.9a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label" contenteditable="false">טלפון</span>
        <span class="contact-text" contenteditable="false">050-542-1034</span>
      </div>
    </a>

    <a class="contact-row" href="https://www.facebook.com/evya.dav.98" target="_blank">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label" contenteditable="false">פייסבוק</span>
        <span class="contact-text" contenteditable="false">Davidi Evyatar</span>
      </div>
    </a>

    <a class="contact-row" href="mailto:evya.phone@gmail.com">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label" contenteditable="false">אימייל</span>
        <span class="contact-text" contenteditable="false">evya.phone@gmail.com</span>
      </div>
    </a>
  </div>

  <div class="bottom">
    <div class="tagline" contenteditable="false">מביא לקוחות. <span>מייצר תוצאות.</span></div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'card_content';
  const ADMIN_PIN = '5471219';

  // ── Persist content ──
  function save() {
    const data = {};
    document.querySelectorAll('[contenteditable]').forEach((el, i) => { data['el_' + i] = el.innerHTML; });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }
  function load() {
    try {
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      document.querySelectorAll('[contenteditable]').forEach((el, i) => {
        if (data['el_' + i] !== undefined) el.innerHTML = data['el_' + i];
      });
    } catch(e) {}
  }

  // ── Secret 5-tap detector ──
  let tapLog = [];
  document.addEventListener('click', () => {
    const now = Date.now();
    tapLog.push(now);
    tapLog = tapLog.filter(t => now - t < 2000);
    if (tapLog.length >= 5) { tapLog = []; openPin(); }
  });

  // ── PIN overlay ──
  function openPin() {
    const ov = document.getElementById('pin-overlay');
    const inp = document.getElementById('pin-input');
    document.getElementById('pin-error').textContent = '';
    inp.value = '';
    ov.classList.add('show');
    setTimeout(() => inp.focus(), 80);
  }
  function closePin() {
    document.getElementById('pin-overlay').classList.remove('show');
  }
  document.getElementById('pin-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPin();
    if (e.key === 'Escape') closePin();
  });
  document.getElementById('pin-input').addEventListener('input', () => {
    if (document.getElementById('pin-input').value.length === ADMIN_PIN.length) checkPin();
  });
  document.getElementById('pin-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('pin-overlay')) closePin();
  });
  function checkPin() {
    const val = document.getElementById('pin-input').value;
    if (val === ADMIN_PIN) {
      closePin();
      openAdmin();
    } else {
      document.getElementById('pin-error').textContent = 'קוד שגוי';
      document.getElementById('pin-input').value = '';
      setTimeout(() => document.getElementById('pin-error').textContent = '', 1500);
    }
  }

  // ── Admin panel ──
  function openAdmin() {
    document.getElementById('admin-panel').classList.add('show');
    updateEditBtn();
  }
  function closeAdmin() {
    if (document.body.classList.contains('edit-mode')) {
      document.body.classList.remove('edit-mode');
      document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = 'false');
      save();
    }
    document.getElementById('admin-panel').classList.remove('show');
  }
  function updateEditBtn() {
    const editing = document.body.classList.contains('edit-mode');
    const btn = document.getElementById('btn-edit');
    btn.classList.toggle('active', editing);
    btn.querySelector('svg').innerHTML = editing
      ? '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>'
      : '<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>';
  }
  function adminToggleEdit() {
    const editing = document.body.classList.toggle('edit-mode');
    document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = editing ? 'true' : 'false');
    if (!editing) save();
    updateEditBtn();
  }
  function adminCopyLink() {
    navigator.clipboard.writeText(location.href).catch(() => {});
    const btn = event.currentTarget;
    const orig = btn.innerHTML;
    btn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> הועתק';
    setTimeout(() => btn.innerHTML = orig, 1500);
  }
  function adminReset() {
    if (!confirm('לאפס את כל השינויים?')) return;
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }

  load();
</script>
</body>
</html>
