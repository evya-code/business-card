<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אביתר דוידי — שיווק נדל"ן</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Heebo', sans-serif;
    padding: 20px;
  }

  .card {
    width: 420px;
    background: linear-gradient(145deg, #111118, #1a1a2e);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
      0 40px 80px rgba(0,0,0,0.6),
      0 0 0 1px rgba(99,102,241,0.15),
      inset 0 1px 0 rgba(255,255,255,0.05);
    overflow: hidden;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #6366f1, #8b5cf6, #06b6d4);
  }

  .glow {
    position: absolute;
    top: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .top {
    padding: 36px 32px 24px;
    position: relative;
  }

  .tag {
    display: inline-block;
    background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.3);
    color: #818cf8;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  .name {
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .name span { color: #818cf8; }

  .title {
    font-size: 14px;
    color: #94a3b8;
    font-weight: 400;
    margin-bottom: 10px;
    line-height: 1.6;
  }

  .greeting {
    font-size: 13px;
    color: rgba(129, 140, 248, 0.7);
    font-weight: 300;
    margin-bottom: 24px;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, rgba(99,102,241,0.3), transparent);
    margin: 0 32px;
  }

  .contacts {
    padding: 24px 32px 32px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .contact-row {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s;
  }

  .contact-row:hover .contact-text { color: #fff; }

  .icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon svg { width: 16px; height: 16px; stroke: #818cf8; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  .contact-info { display: flex; flex-direction: column; }

  .contact-label {
    font-size: 10px;
    color: #475569;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 1px;
  }

  .contact-text {
    font-size: 14px;
    color: #cbd5e1;
    font-weight: 400;
    direction: ltr;
    text-align: right;
    transition: color 0.2s;
  }

  .bottom {
    padding: 16px 32px 20px;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .tagline { font-size: 12px; color: #475569; font-style: italic; }
  .tagline span { color: #6366f1; }

  .dots { display: flex; gap: 5px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(99,102,241,0.4); }
  .dot:first-child { background: #6366f1; }
  .dot:nth-child(2) { background: rgba(99,102,241,0.6); }

  /* ── Edit toggle ── */
  #mode-btn {
    position: fixed;
    bottom: 24px;
    left: 24px;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    z-index: 100;
  }
  #mode-btn:hover { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.3); }
  #mode-btn svg { width: 15px; height: 15px; stroke: #475569; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.2s; }
  #mode-btn:hover svg { stroke: #818cf8; }

  /* edit mode styles */
  body.edit-mode [contenteditable] {
    outline: none;
    border-bottom: 1px dashed rgba(99,102,241,0.4);
    cursor: text;
  }
  body.edit-mode [contenteditable]:focus {
    border-bottom-color: #6366f1;
    background: rgba(99,102,241,0.06);
    border-radius: 3px;
  }
  body.edit-mode .contact-row { pointer-events: none; }
</style>
</head>
<body>

<button id="mode-btn" title="החלף מצב" onclick="toggleMode()">
  <!-- book icon (read mode default) -->
  <svg id="icon-book" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
  <svg id="icon-pen" viewBox="0 0 24 24" style="display:none"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
</button>

<div class="card">
  <div class="glow"></div>

  <div class="top">
    <div class="tag" contenteditable="false">שיווק נדל"ן · AI</div>
    <div class="name" contenteditable="false">אביתר <span>דוידי</span></div>
    <div class="title" contenteditable="false">שיווק דיגיטלי · יצירת לידים לנדל"ן<br>AI · תוכן · קשרי לקוחות</div>
    <div class="greeting" contenteditable="false">ברוך הבא, הנה הפרטים שלי</div>
  </div>

  <div class="divider"></div>

  <div class="contacts">
    <a class="contact-row" href="tel:0505421034">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.9a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label" contenteditable="false">טלפון</span>
        <span class="contact-text" contenteditable="false">050-542-1034</span>
      </div>
    </a>

    <a class="contact-row" href="https://www.facebook.com/evya.dav.98" target="_blank">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label" contenteditable="false">פייסבוק</span>
        <span class="contact-text" contenteditable="false">Davidi Evyatar</span>
      </div>
    </a>

    <a class="contact-row" href="mailto:evya.phone@gmail.com">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label" contenteditable="false">אימייל</span>
        <span class="contact-text" contenteditable="false">evya.phone@gmail.com</span>
      </div>
    </a>
  </div>

  <div class="bottom">
    <div class="tagline" contenteditable="false">מביא לקוחות. <span>מייצר תוצאות.</span></div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'card_content';

  function save() {
    const data = {};
    document.querySelectorAll('[contenteditable]').forEach((el, i) => {
      data['el_' + i] = el.innerHTML;
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function load() {
    try {
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      document.querySelectorAll('[contenteditable]').forEach((el, i) => {
        if (data['el_' + i] !== undefined) el.innerHTML = data['el_' + i];
      });
    } catch(e) {}
  }

  function toggleMode() {
    const editing = document.body.classList.toggle('edit-mode');
    document.querySelectorAll('[contenteditable]').forEach(el => {
      el.contentEditable = editing ? 'true' : 'false';
    });
    document.getElementById('icon-book').style.display = editing ? 'none' : '';
    document.getElementById('icon-pen').style.display = editing ? '' : 'none';
    if (!editing) save();
  }

  load();
</script>
</body>
</html>
